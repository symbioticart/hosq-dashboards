<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOSQ — Доказательства A–J</title>
<meta name="description" content="Доказательная база HOSQ по 10 векторам A–J. Покрытие данными, не баллы.">
<link rel="stylesheet" href="/styles/app.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head><body>
<div id="hdr"></div>
<main class="wrap" id="app"><div class="empty">Загрузка…</div></main>
<div id="ftr"></div>
<script type="module">
import {theme,C,loadJSON,chart,header,footer,gcard} from '/src/common.js';
echarts.registerTheme('hosq',theme);
document.getElementById('hdr').innerHTML=header('impact');
const [agg,projects,legend,meta]=await Promise.all([
  loadJSON('/data/aggregates.json'),loadJSON('/data/projects.json'),
  loadJSON('/data/metrics_legend.json'),loadJSON('/data/manifest.json')]);
document.getElementById('ftr').innerHTML=footer(meta);
const vc=agg.vector_coverage, V=legend.vectors.map(v=>v.vector), FOCUS=new Set(['G','A','D']), pp=x=>Math.round(x*100);

document.getElementById('app').innerHTML=`
<section class="hero">
  <div class="draft-pill" style="margin-bottom:14px">● ДОКАЗАТЕЛЬНАЯ БАЗА · НЕ БАЛЛЫ</div>
  <h1>Доказательства по 10 векторам A–J</h1>
  <p class="lead">Показываем, насколько собраны свидетельства по каждому вектору, а не оценку качества. Высокий процент значит «поля заполнены», а не «сделано хорошо». Пробелы подсказывают, что собрать дальше.</p>
</section>
<div class="note">Три вектора — стратегические приоритеты фонда: <b>A Cultural Vitality, D Artistic Quality, G Internationality</b> (выделены коралловым). Из них D (16%) и G (28%) задокументированы слабее всего — приоритет на словах есть, доказательств под него пока мало.</div>

<section class="block"><h2>Что закрывать первым: стратегический приоритет × доказательная база</h2>
  ${gcard({title:'Стратегический приоритет × доказательная база',id:'quad',kind:'tall',
    read:'по горизонтали — сколько собрано доказательств, по вертикали — приоритет вектора; левый-верхний угол (приоритет есть, доказательств мало) закрываем первым.',
    ai:'В зоне «важно, но пусто» — <b>D Artistic Quality (16%)</b> и <b>G Internationality (28%)</b>, приоритеты с самым тонким доказательным слоем. Сбор кейсов и метрик именно по D и G даст максимум для следующей заявки.',
    src:'X — доля заполненных доказательств по вектору · Y — стратегический приоритет'})}
</section>

<section class="block"><h2>Карта покрытия: проекты × векторы</h2>
  <div class="hl">
    <span><span class="sw" style="background:#14B672"></span>есть доказательства</span>
    <span><span class="sw" style="background:#FFD2C7"></span>частично</span>
    <span><span class="sw" style="background:#EDE6DB"></span>нет данных</span>
  </div>
  ${gcard({title:'Проекты × векторы',id:'heat',kind:'heatmap',
    read:'строки — проекты, столбцы — векторы A–J; цвет клетки показывает, есть ли по этой паре доказательства.',
    ai:'Поле заполнено неровно: сильнее всего <b>A Cultural Vitality (52%)</b>, слабее всего <b>B и I (по 7%)</b>. Карта показывает, у каких проектов пустуют приоритетные векторы — с них и начинать дозаполнение.',
    src:'40 субиндексов A–J · доля заполненных полей-доказательств'})}
</section>

<section class="block"><h2>Покрытие по типам проектов</h2>
  ${gcard({title:'Тип проекта × вектор',id:'heat2',kind:'tall',
    read:'строки — типы проектов, столбцы — векторы A–J; цвет — доля заполненных доказательств в этой паре.',
    ai:'Сбор идёт неравномерно по типам: при среднем A 52% приоритетные <b>D (16%)</b> и <b>G (28%)</b> почти всюду бледные. Карта показывает, какому типу проектов какой вектор дозаполнять, чтобы закрыть приоритеты.',
    src:'среднее покрытие по типу проекта × вектор'})}
</section>

<section class="block">
  <h2>Векторы: покрытие и приоритет</h2>
  <p class="muted">Каждая карточка — один вектор: процент собранных доказательств и пометка, входит ли он в стратегические приоритеты.</p>
  <div class="vgrid" id="vcards" style="margin-top:16px"></div>
  <div class="ai-insight" style="margin-top:24px"><div>Покрытие падает от <b>52% (A)</b> до <b>7% (B, I)</b> — портфель документирует культурную активность, но почти не фиксирует креативную экономику и вовлечённость участников. Это пробел для отчётности, а не обязательно пробел в работе.</div></div>
</section>`;

// vector cards
document.getElementById('vcards').innerHTML=legend.vectors.map(v=>{
  const pct=pp(vc[v.vector].coverage), focus=FOCUS.has(v.vector);
  return `<div class="vcard">
    <div class="vh"><b style="color:${focus?C.coral:C.dark}">${v.vector}</b> <span>${v.name}</span></div>
    ${focus?'<div class="focus-badge">стратегический приоритет</div>':''}
    <div class="bar"><span style="width:${pct}%;background:${focus?C.coral:C.violet}"></span></div>
    <div class="cov">${pct}% покрытие · ${vc[v.vector].n_fields} полей-доказательств</div>
    <div class="muted" style="font-size:12px;margin-top:6px">${v.subindices.map(s=>s.code).join(' · ')}</div>
  </div>`;}).join('');

// priority × evidence quadrant
(function(){const pe=agg.insights.priority_evidence;
  const pts=pe.map((d,i)=>({name:d.vector,full:d.name,cov:d.coverage,focus:d.focus,value:[d.coverage,(d.focus?1:0)+((i%4)-1.5)*0.05]}));
  const c=chart(document.getElementById('quad'));
  c.setOption({...theme,tooltip:{formatter:p=>`${p.data.name} · ${p.data.full}<br><b>${pp(p.data.cov)}%</b> покрытие · ${p.data.focus?'стратегический приоритет':'обычный вектор'}`},
    grid:{left:60,right:24,top:24,bottom:44,containLabel:true},
    xAxis:{type:'value',min:0,max:1,name:'доказательная база →',nameLocation:'middle',nameGap:30,axisLabel:{formatter:v=>pp(v)+'%'}},
    yAxis:{type:'value',min:-0.5,max:1.5,interval:1,name:'приоритет ↑',nameLocation:'middle',nameGap:70,axisLabel:{formatter:v=>v>=1?'приоритет':(v<=0?'прочие':'')}},
    series:[{type:'scatter',symbolSize:30,data:pts,itemStyle:{color:p=>p.data.focus?C.coral:'#D8CCBE',borderColor:'#fff',borderWidth:2},
      label:{show:true,formatter:p=>p.data.name,color:C.dark,fontWeight:700,position:'inside'},
      markLine:{symbol:'none',silent:true,lineStyle:{color:C.muted,type:'dashed'},label:{formatter:'30%',color:C.muted},data:[{xAxis:0.3}]},
      markArea:{silent:true,itemStyle:{color:'rgba(255,111,85,.08)'},label:{show:true,position:'top',color:C.coral,fontWeight:700,formatter:'закрыть первым'},data:[[{xAxis:0,yAxis:0.5},{xAxis:0.3,yAxis:1.5}]]}}]});})();

// heatmap projects × vectors
(function(){const labels=projects.map(p=>(p.title||p.slug).slice(0,28));const data=[];
  projects.forEach((p,y)=>V.forEach((v,x)=>data.push([x,y,p.vector_coverage[v]==null?0:p.vector_coverage[v]])));
  const c=chart(document.getElementById('heat'));
  c.setOption({...theme,tooltip:{position:'top',formatter:p=>`${labels[p.data[1]]}<br>${V[p.data[0]]} ${vc[V[p.data[0]]].name}: <b>${pp(p.data[2])}%</b>`},
    grid:{left:12,right:16,top:30,bottom:8,containLabel:true},
    xAxis:{type:'category',data:V,position:'top',axisLine:{show:false},axisTick:{show:false},axisLabel:{fontWeight:700,color:C.dark}},
    yAxis:{type:'category',data:labels,inverse:true,axisLine:{show:false},axisTick:{show:false},axisLabel:{fontSize:11,color:C.muted}},
    visualMap:{show:false,min:0,max:1,inRange:{color:['#EDE6DB','#FFD2C7','#FF6F55','#14B672']}},
    series:[{type:'heatmap',data,itemStyle:{borderColor:C.cream,borderWidth:2,borderRadius:3}}]});})();

// heatmap type × vector
(function(){const by={};projects.forEach(p=>{const t=p.type;if(!t)return;(by[t]=by[t]||[]).push(p);});
  const types=Object.keys(by);const data=[];
  types.forEach((t,y)=>V.forEach((v,x)=>{const ps=by[t];const avg=ps.reduce((s,p)=>s+(p.vector_coverage[v]||0),0)/ps.length;data.push([x,y,avg]);}));
  const c=chart(document.getElementById('heat2'));
  c.setOption({...theme,tooltip:{position:'top',formatter:p=>`${types[p.data[1]]}<br>${V[p.data[0]]} ${vc[V[p.data[0]]].name}: <b>${pp(p.data[2])}%</b>`},
    grid:{left:12,right:16,top:30,bottom:8,containLabel:true},
    xAxis:{type:'category',data:V,position:'top',axisLine:{show:false},axisTick:{show:false},axisLabel:{fontWeight:700,color:C.dark}},
    yAxis:{type:'category',data:types,inverse:true,axisLine:{show:false},axisTick:{show:false},axisLabel:{fontSize:12,color:C.dark}},
    visualMap:{show:false,min:0,max:1,inRange:{color:['#EDE6DB','#FFD2C7','#FF6F55','#14B672']}},
    series:[{type:'heatmap',data,label:{show:true,formatter:p=>pp(p.data[2])||'',color:C.dark,fontSize:11},
      itemStyle:{borderColor:C.cream,borderWidth:2,borderRadius:4}}]});})();
</script></body></html>
