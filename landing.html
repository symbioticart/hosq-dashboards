<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOSQ — культурный фонд</title>
<meta name="description" content="HOSQ — культурный фонд (Армения). 47 проектов, рассказанных данными.">
<link rel="stylesheet" href="/styles/app.css">
<style>
  body{background:var(--cream)}
  .lp{min-height:100vh;display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1fr);gap:0;position:relative}
  .lp__text{display:flex;flex-direction:column;justify-content:center;padding:clamp(32px,5vw,80px);position:relative;z-index:2}
  .lp__art{position:relative;min-height:60vh}
  .lp__art canvas{position:absolute;inset:0;width:100%;height:100%}
  .wordmark{font:700 26px/1 var(--f);letter-spacing:-.02em;color:var(--ink)}
  .eyebrow{font:500 12px/1 var(--f);letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:36px 0 18px}
  .lp h1{font:700 clamp(40px,5.4vw,76px)/1.02 var(--f);letter-spacing:-.03em;color:var(--ink);margin:0;max-width:14ch}
  .lp h1 .c{color:var(--coral)}
  .lp .sub{font:400 18px/1.55 var(--f);color:var(--muted);max-width:42ch;margin:22px 0 0}
  .stats{display:flex;gap:40px;flex-wrap:wrap;margin:36px 0 0}
  .stats .s b{display:block;font:700 38px/1 var(--f);letter-spacing:-.02em;color:var(--ink);font-variant-numeric:tabular-nums}
  .stats .s span{font:500 13px/1.3 var(--f);color:var(--muted);margin-top:6px;display:block}
  .enter{display:flex;gap:10px;flex-wrap:wrap;margin:44px 0 0}
  .enter a{font:500 14px/1 var(--f);padding:11px 20px;border-radius:999px;border:1px solid var(--line);color:var(--ink);background:#fff;transition:.15s}
  .enter a:hover{text-decoration:none;border-color:var(--coral);color:var(--coral)}
  .enter a.prim{background:var(--ink);color:var(--cream);border-color:var(--ink)}
  .enter a.prim:hover{background:var(--coral);border-color:var(--coral);color:#fff}
  .legend{position:absolute;left:clamp(20px,3vw,40px);bottom:24px;z-index:2;font:500 12px/1.5 var(--f);color:var(--muted);background:rgba(235,226,214,.78);backdrop-filter:blur(4px);padding:10px 14px;border-radius:12px}
  .legend b{color:var(--ink);font-weight:700}
  .grain{position:absolute;inset:0;pointer-events:none;z-index:3;opacity:.5;mix-blend-mode:multiply}
  .footnote{position:absolute;right:clamp(20px,3vw,40px);bottom:24px;z-index:4;font:500 12px/1 var(--f);color:var(--muted);display:flex;gap:8px;align-items:center}
  .footnote .dot{width:7px;height:7px;border-radius:999px;background:var(--coral)}
  @media(max-width:880px){
    .lp{grid-template-columns:1fr}
    .lp__art{order:-1;min-height:46vh}
    .lp__text{padding:28px 22px 36px}
    .legend{display:none}
  }
</style>
</head><body>
<div class="lp">
  <div class="lp__text">
    <div class="wordmark">hosq</div>
    <div class="eyebrow">культурный фонд · Армения</div>
    <h1>Каждая форма здесь — <span class="c">проект</span> фонда</h1>
    <p class="sub" id="sub">Картина слева собрана из реальных данных: размер формы — охват, цвет — формат, положение по кругу — месяц. Бледные формы — там, где данные ещё не собраны.</p>
    <div class="stats" id="stats"></div>
    <div class="enter">
      <a class="prim" href="/index.html">Портфель →</a>
      <a href="/analytics.html">Аналитика</a>
      <a href="/impact.html">Доказательства A–J</a>
      <a href="/showcase.html">Витрина</a>
      <a href="/data.html">Данные</a>
    </div>
  </div>
  <div class="lp__art">
    <canvas id="bloom"></canvas>
    <canvas class="grain" id="grain"></canvas>
    <div class="legend" id="legend"></div>
    <div class="footnote"><span class="dot"></span><span id="fn">черновые данные</span></div>
  </div>
</div>
<script type="module">
import {loadJSON} from '/src/common.js';
const C={coral:'#FF6F55',violet:'#C47CF1',green:'#14B672',blue:'#56A4CB',pink:'#E770C3',ink:'#231F20',cream:'#EBE2D6'};
const TC={community_event:C.green,lecture_series:C.blue,concert:C.pink,lab_showcase:C.coral,workshop_series:C.violet,hybrid:'#8C6FE0'};
const TLABEL={lab_showcase:'лаборатории',lecture_series:'лекции',community_event:'события',workshop_series:'мастер-классы',concert:'концерты',hybrid:'гибриды'};
const [P,agg,meta]=await Promise.all([loadJSON('/data/projects.json'),loadJSON('/data/aggregates.json'),loadJSON('/data/manifest.json')]);
const asof=meta.export_date.split('-').reverse().join('.');
document.getElementById('fn').textContent='черновые данные · '+asof;

// stats
const stat=(n,l)=>`<div class="s"><b>${n}</b><span>${l}</span></div>`;
document.getElementById('stats').innerHTML=
  stat(agg.project_count,'проектов')+
  stat(agg.audience_onsite_total.value.toLocaleString('ru-RU'),'офлайн-зрителей')+
  stat(agg.partners_local_total.value,'партнёров')+
  stat('2024–26','годы');

// legend (types present)
const types=[...new Set(P.map(p=>p.type).filter(Boolean))];
document.getElementById('legend').innerHTML='<b>Форматы:</b> '+types.map(t=>`<span style="color:${TC[t]}">●</span> ${TLABEL[t]||t}`).join('  ');

// ---- generative bloom ----
const months=[...new Set(P.map(p=>p.start_month).filter(Boolean))].sort();
const mIndex=m=>months.indexOf(m);
const avgCov=p=>{const v=Object.values(p.vector_coverage).filter(x=>x!=null);return v.length?v.reduce((a,b)=>a+b)/v.length:0;};
const maxAud=Math.max(...P.map(p=>p.audience_onsite||0),1);
// stable per-project jitter (seeded by index — deterministic)
const rnd=i=>{const x=Math.sin(i*127.1+43.7)*43758.5453;return x-Math.floor(x);};

const cv=document.getElementById('bloom'),ctx=cv.getContext('2d');
function draw(){
  const wrap=cv.parentElement,dpr=Math.min(window.devicePixelRatio||1,2);
  const W=wrap.clientWidth,H=wrap.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  // soft organic background clouds (editorial brand layer, low alpha)
  const blob=(x,y,r,col,a)=>{const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,col+Math.round(a*255).toString(16).padStart(2,'0'));g.addColorStop(1,col+'00');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();};
  blob(W*0.30,H*0.32,W*0.5,C.coral,0.12);
  blob(W*0.74,H*0.66,W*0.46,C.violet,0.12);
  blob(W*0.62,H*0.24,W*0.32,C.green,0.07);
  const cx=W*0.52,cy=H*0.5,R=Math.min(W,H)*0.34;
  // connective tendrils + petals
  P.forEach((p,i)=>{
    const mi=p.start_month?mIndex(p.start_month):(i%months.length);
    const ang=(mi/months.length)*Math.PI*2 - Math.PI/2 + (rnd(i)-0.5)*0.34;
    const rr=R*(0.62+rnd(i+99)*0.5);
    const x=cx+Math.cos(ang)*rr, y=cy+Math.sin(ang)*rr;
    const aud=p.audience_onsite;
    const size=aud!=null ? 7+Math.sqrt(aud/maxAud)*30 : 4.5;   // missing reach -> tiny seed
    const cov=avgCov(p);
    const alpha=aud!=null ? 0.45+cov*0.5 : 0.28;               // sparse data -> faint
    const col=TC[p.type]||'#8C6FE0';
    // tendril
    ctx.strokeStyle=C.ink+'18';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx,cy);
    const mx=cx+Math.cos(ang)*rr*0.5+(rnd(i+5)-0.5)*30, my=cy+Math.sin(ang)*rr*0.5+(rnd(i+7)-0.5)*30;
    ctx.quadraticCurveTo(mx,my,x,y);ctx.stroke();
    // petal (organic leaf)
    ctx.save();ctx.translate(x,y);ctx.rotate(ang);
    ctx.fillStyle=col+Math.round(alpha*255).toString(16).padStart(2,'0');
    ctx.beginPath();
    ctx.ellipse(0,0,size,size*0.62,0,0,Math.PI*2);
    ctx.fill();
    // bright core for well-documented
    if(aud!=null){ctx.fillStyle=col;ctx.globalAlpha=Math.min(1,0.5+cov);ctx.beginPath();ctx.arc(0,0,size*0.32,0,7);ctx.fill();ctx.globalAlpha=1;}
    ctx.restore();
  });
  // center mark
  ctx.fillStyle=C.ink;ctx.beginPath();ctx.arc(cx,cy,5,0,7);ctx.fill();
}
// grain
function grain(){const g=document.getElementById('grain'),gx=g.getContext('2d');
  const W=g.parentElement.clientWidth,H=g.parentElement.clientHeight;g.width=W;g.height=H;
  const id=gx.createImageData(W,H),d=id.data;
  for(let i=0;i<d.length;i+=4){const v=Math.random()*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=14;}
  gx.putImageData(id,0,0);}
function render(){draw();grain();}
render();
let t;window.addEventListener('resize',()=>{clearTimeout(t);t=setTimeout(render,120);});
</script>
</body></html>
