<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOSQ — Главная</title>
<meta name="description" content="Внутренний хаб команды фонда HOSQ: пульс портфеля, что требует внимания, вход в 5 разделов.">
<meta property="og:title" content="HOSQ — панель фонда"><meta property="og:type" content="website">
<link rel="stylesheet" href="/styles/app.css">
</head><body>
<div id="hdr"></div>
<main class="wrap" id="app"><div class="empty">Загрузка…</div></main>
<div id="ftr"></div>
<script type="module">
import {C,loadJSON,fmt,money,header,footer} from '/src/common.js';
document.getElementById('hdr').innerHTML=header('home');
const [agg,P,meta]=await Promise.all([
  loadJSON('/data/aggregates.json'),loadJSON('/data/projects.json'),loadJSON('/data/manifest.json')]);
document.getElementById('ftr').innerHTML=footer(meta);
const asof=meta.export_date.split('-').reverse().join('.');

// ---- live honest computations ----
const N=agg.project_count;
const cnt=k=>P.filter(p=>p[k]!=null&&p[k]!==''&&!(Array.isArray(p[k])&&!p[k].length)).length;
const fillBudget=agg.budget_total_usd.n_covered, fillAud=agg.audience_onsite_total.n_covered, fillPart=agg.partners_local_total.n_covered;
const fillTeam=cnt('team_size'), fillParticip=cnt('participants_onsite');
const readiness=Math.round((fillBudget/N*0.30 + fillAud/N*0.25 + fillPart/N*0.20 + fillTeam/N*0.15 + fillParticip/N*0.10)*100);
const vc=agg.vector_coverage;
const avgAJ=Math.round(Object.values(vc).reduce((s,v)=>s+v.coverage,0)/Object.keys(vc).length*100);
function gini(vals){const v=[...vals].sort((a,b)=>a-b);const n=v.length;const tot=v.reduce((a,b)=>a+b,0);if(!n||!tot)return 0;let c=0,prev=0,g=1;for(const x of v){c+=x;const L=c/tot;g-=(prev+L)/n;prev=L;}return g;}
const giniB=gini(P.filter(p=>p.budget_usd!=null).map(p=>p.budget_usd)).toFixed(2).replace('.',',');
const top3=Math.round(agg.insights.budget_concentration.top['3']*100);

const kpi=(href,num,lbl,den,acc)=>`<a class="kpi accent-${acc}" href="${href}"><div class="num">${num}</div><div class="lbl">${lbl}</div>${den?`<div class="den">${den}</div>`:''}</a>`;
const attn=(label,ttl,act,linkText,href)=>`<a class="attn" href="${href}"><div class="alabel">${label}</div><div class="attl">${ttl}</div><div class="aact">${act}</div><div class="alink">${linkText} →</div></a>`;
const route=(cls,href,ico,ttl,desc,metric)=>`<a class="route ${cls}" href="${href}"><div class="rico">${ico}</div><div class="rttl">${ttl}</div><div class="rdesc">${desc}</div><div class="rmetric">${metric}</div><div class="rcta">Открыть →</div></a>`;

document.getElementById('app').innerHTML=`
<section class="hubhero">
  <p class="lbl" style="color:var(--ink-2)">HOSQ · культурный фонд, Армения · панель данных</p>
  <h1 style="margin-top:10px">С возвращением — вот где фонд сегодня</h1>
  <p class="lead">Состояние портфеля и точки входа в пять разделов. Заходите свериться с пульсом и решить, куда смотреть дальше.</p>
  <p class="bluf">${N} проектов за 2024–2026. Результаты реальны, но фонд знает их наполовину: бюджет и охват собраны на 57–64%, а <b>${top3}% денег держат три проекта</b>.</p>
</section>

<section class="kpis" style="margin-top:8px">
  ${kpi('/portfolio.html',N,'проектов','2024–2026','coral')}
  ${kpi('/portfolio.html',money(agg.budget_total_usd.value),'бюджет',`по ${fillBudget} из ${N}`,'green')}
  ${kpi('/portfolio.html',fmt(agg.audience_onsite_total.value),'офлайн-охват',`по ${fillAud} из ${N}`,'blue')}
  ${kpi('/portfolio.html',agg.partners_local_total.value,'локальных партнёров',`по ${fillPart} из ${N}`,'violet')}
  ${kpi('/data.html',readiness+'%','готовность данных','по 5 ключевым полям','pink')}
</section>
<p class="muted" style="font-size:13px;margin-top:8px">Данные на ${asof} · черновые. A–J измеряет полноту документации, а не качество; суммы и проценты будут меняться по мере заполнения таблицы.</p>

<section class="block"><h2>Требует внимания</h2>
  <p class="muted" style="margin-top:-12px">Честный список пробелов и рисков с готовым действием — отранжирован по влиянию на развитие фонда.</p>
  <div class="attngrid" style="margin-top:16px">
    ${attn('Риск концентрации','61% бюджета — в трёх проектах','Зафиксируйте порог концентрации и в следующем цикле наращивайте средний сегмент, а не флагман.','Аналитика','/analytics.html')}
    ${attn('Не подтверждено','Международные партнёры: 0 из 47','Поле не заполнено ни у одного проекта. Проставьте есть/нет/неизвестно; до этого не показывайте «0» как факт.','Данные','/data.html')}
    ${attn('Слабая база','Приоритеты G (28%) и D (16%) задокументированы хуже всего','Догрузите доказательства по G и D до уровня A (52%), прежде чем заявлять эти приоритеты вовне.','Доказательства A–J','/impact.html')}
    ${attn('Дыра в данных','Бюджет по 27/47, охват по 30/47','Закройте 20 проектов без бюджета — это быстрее всего поднимает доверие к итогу $375k.','Данные','/data.html')}
    ${attn('Люди невидимы','Участники указаны у 5 из 47, рабочие места — пусто','Введите обязательный минимум полей про людей для новых проектов.','Данные','/data.html')}
    ${attn('Пробел покрытия','B и I задокументированы по 7% — слабее всех','Решите по каждому направлению: это пробел работы или документации, и закройте.','Доказательства A–J','/impact.html')}
  </div>
</section>

<section class="block"><h2>Разделы</h2>
  <p class="muted" style="margin-top:-12px">Пять входов. Под каждым — одна живая цифра, чтобы выбрать осознанно.</p>
  <div class="routegrid" style="margin-top:16px">
    ${route('r-coral','/portfolio.html','◧','Портфель','Масштаб, деньги, охват и все проекты фонда',`${N} проектов · 2 языка`)}
    ${route('r-blue','/analytics.html','◷','Аналитика','12 кросс-графиков по фреймворкам экономистов (Lorenz, DEA, Sankey)',`Gini ≈ ${giniB} · топ-3 = ${top3}%`)}
    ${route('r-green','/impact.html','✓','Доказательства A–J','Полнота доказательной базы по 10 направлениям',`средн. покрытие ~${avgAJ}% · лучшее A 52%`)}
    ${route('r-violet','/showcase.html','◆','Витрина','Живые проекты и флагман Notations Lab','Notations Lab: 87 чел, 13 событий')}
    ${route('r-ink','/data.html','▦','Данные','Исходная таблица и полнота полей',`готовность данных ~${readiness}%`)}
  </div>
</section>`;
</script></body></html>
