<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOSQ — Портфель фонда</title>
<meta name="description" content="Дашборд портфеля культурного фонда HOSQ: проекты, охват, партнёры, бюджет.">
<meta property="og:title" content="HOSQ — Портфель фонда"><meta property="og:type" content="website">
<link rel="stylesheet" href="/styles/app.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head><body>
<div id="hdr"></div>
<main class="wrap" id="app"><div class="empty">Загрузка данных…</div></main>
<div id="ftr"></div>
<script type="module">
import {theme,C,CAT,loadJSON,fmt,money,chart,header,footer,FOCUS} from '/src/common.js';
echarts.registerTheme('hosq',theme);
document.getElementById('hdr').innerHTML=header('portfolio');
const [agg,projects,meta]=await Promise.all([
  loadJSON('/data/aggregates.json'),loadJSON('/data/projects.json'),loadJSON('/data/manifest.json')]);
document.getElementById('ftr').innerHTML=footer(meta);

const kpi=(num,lbl,den,acc)=>`<div class="kpi accent-${acc}"><div class="num">${num}</div><div class="lbl">${lbl}</div>${den?`<div class="den">${den}</div>`:''}</div>`;
const card=(title,job,inner,src,insight)=>`<div class="card"><h3>${title}</h3><div class="job">${job}</div>${inner}${insight?`<div class="insight">${insight}</div>`:''}<div class="src">${src}</div></div>`;
const icard=(title,job,takeaway,inner,src)=>`<div class="card"><h3>${title}</h3><div class="job">${job}</div>${takeaway}${inner}<div class="src">${src}</div></div>`;

const b=agg.budget_total_usd, ao=agg.audience_onsite_total;
document.getElementById('app').innerHTML=`
<section class="hero">
  <div class="draft-pill">● ЧЕРНОВЫЕ ДАННЫЕ · ${meta.export_date}</div>
  <h1>Портфель HOSQ за ${Object.keys(agg.by_year).filter(y=>y!=='—').join(', ')}</h1>
  <p class="lead">Что фонд сделал, для кого и с кем. Каждая цифра показана только по тем проектам, где есть данные — пустые поля не превращаются в «ноль».</p>
</section>
<section class="kpis">
  ${kpi(agg.project_count,'проектов','статус: completed/planned','coral')}
  ${kpi(money(b.value),'суммарный бюджет',`по ${b.n_covered} из ${b.n_total} проектов`,'green')}
  ${kpi(fmt(ao.value),'офлайн-охват (зрители)',`по ${ao.n_covered} из ${ao.n_total}`,'blue')}
  ${kpi(agg.partners_local_total.value,'локальных партнёров',`по ${agg.partners_local_total.n_covered} из ${agg.partners_local_total.n_total}`,'violet')}
  ${kpi(agg.distinct_language_count,'языков работы',agg.distinct_languages.join(' · '),'pink')}
</section>
<div class="note">⚠️ Рабочие места, международные партнёры и онлайн-охват в источнике не заполнены — поэтому здесь не показаны (вместо ложного «0»). Командные/партнёрские/событийные данные доступны только по флагманской программе Notations Lab — см. «Витрину».</div>
<section class="block"><h2>Деньги и охват</h2><div class="grid2">
  ${icard('Сколько стоит один зритель — по форматам','JOB: Когда директор решает, какой формат масштабировать ради охвата, это показывает стоимость одного зрителя по типам.','<div id="tk_eff" class="takeaway green"></div>','<div id="c_eff" class="chart"></div>',`budget ÷ офлайн-охват, по проектам где есть оба поля (n=${agg.insights.efficiency.n})`)}
  ${icard('Концентрация бюджета','JOB: Когда донор оценивает устойчивость, это показывает, на скольких проектах держится бюджет.','<div id="tk_conc" class="takeaway"></div>','<div id="c_conc" class="chart"></div>',`budget_total_usd, накопленная доля (n=${agg.insights.budget_concentration.n})`)}
</div></section>
<section class="block"><h2>Стримы: где что сильнее</h2>
  ${icard('network против foundation — покрытие по 10 векторам','JOB: Когда борд выбирает, какой стрим развивать, это показывает, где каждый стрим документирован сильнее.','<div id="tk_stream" class="takeaway violet"></div>','<div id="c_streamr" class="chart tall"></div>','Доля заполненных доказательств A–J, среднее по стриму')}
</section>
<section class="block">
  <h2>Все проекты</h2>
  <p class="muted">Фильтруйте по стриму, типу и году. Клик по карточке — детальный профиль проекта.</p>
  <div class="filters" id="filters"></div>
  <div class="pgrid" id="pgrid"></div>
</section>`;

// ---- insight charts ----
const INS=agg.insights;
const pp=x=>Math.round(x*100);

// 1. cost per attendee by type (cheapest green, priciest coral)
(function(){const d=INS.efficiency.by_type;const c=chart(document.getElementById('c_eff'));
  const col=(i,n)=>i===0?C.green:(i===n-1?C.coral:C.violet);
  c.setOption({...theme,tooltip:{trigger:'axis',formatter:p=>{const r=d[p[0].dataIndex];
      return `${r.type}<br><b>$${r.cost_per}</b> / зритель<br>${r.n} проектов · ${r.audience.toLocaleString('en-US')} зрителей · $${r.budget.toLocaleString('en-US')}`}},
    grid:{left:8,right:64,top:10,bottom:8,containLabel:true},
    xAxis:{type:'value',axisLabel:{formatter:v=>'$'+v}},
    yAxis:{type:'category',inverse:true,data:d.map(x=>x.type)},
    series:[{type:'bar',data:d.map((x,i)=>({value:x.cost_per,itemStyle:{color:col(i,d.length),borderRadius:[0,6,6,0]}})),
      label:{show:true,position:'right',color:C.dark,formatter:p=>'$'+p.value}}]});
  const lo=d[0],hi=d[d.length-1];
  document.getElementById('tk_eff').innerHTML=`<span class="ic">💡</span><div>Зритель в формате «<b>${lo.type}</b>» стоит <b>$${lo.cost_per}</b>, в «<b>${hi.type}</b>» — <b>$${hi.cost_per}</b> (разница ${Math.round(hi.cost_per/lo.cost_per)}×). Для массового охвата масштабируй дешёвые форматы; дорогие держи как флагманы.</div>`;})();

// 2. budget concentration (Pareto)
(function(){const cum=INS.budget_concentration.cumulative_share.map((v,i)=>[i+1,pp(v)]);
  const c=chart(document.getElementById('c_conc'));
  c.setOption({...theme,tooltip:{trigger:'axis',formatter:p=>`Топ-${p[0].data[0]} проектов = <b>${p[0].data[1]}%</b> бюджета`},
    grid:{left:8,right:20,top:10,bottom:24,containLabel:true},
    xAxis:{type:'value',name:'число проектов',nameLocation:'middle',nameGap:30,min:1,max:cum.length},
    yAxis:{type:'value',max:100,axisLabel:{formatter:v=>v+'%'}},
    series:[{type:'line',data:cum,smooth:true,symbol:'none',lineStyle:{color:C.coral,width:3},
      areaStyle:{color:'rgba(255,111,85,.15)'},
      markLine:{symbol:'none',label:{color:C.muted},data:[{xAxis:3,lineStyle:{color:C.muted,type:'dashed'},label:{formatter:'топ-3'}}]}}]});
  const t=INS.budget_concentration.top;
  document.getElementById('tk_conc').innerHTML=`<span class="ic">⚠️</span><div><b>Топ-3 проекта = ${pp(t['3'])}%</b> всего бюджета, топ-5 = ${pp(t['5'])}%. Портфель сильно сконцентрирован — стоит обсудить зависимость от нескольких крупных проектов.</div>`;})();

// 3. stream radar network vs foundation
(function(){const cbs=INS.coverage_by_stream;const V=Object.keys(agg.vector_coverage);
  if(!cbs.network||!cbs.foundation){document.getElementById('tk_stream').innerHTML='';return;}
  const series=Object.entries(cbs).map(([s,o])=>({value:V.map(v=>pp(o.coverage[v])),name:`${s} (n=${o.n})`}));
  const c=chart(document.getElementById('c_streamr'));
  c.setOption({...theme,color:[C.coral,C.blue],legend:{bottom:0},tooltip:{},
    radar:{indicator:V.map(v=>({name:v,max:60})),radius:'62%',axisName:{color:C.dark,fontWeight:700},splitLine:{lineStyle:{color:'#00000012'}},splitArea:{areaStyle:{color:['#fff','#faf6f0']}}},
    series:[{type:'radar',data:series,areaStyle:{opacity:.12}}]});
  const net=cbs.network.coverage,fnd=cbs.foundation.coverage,nm=k=>agg.vector_coverage[k].name;
  let nb={v:'',d:-9},fb={v:'',d:-9};
  V.forEach(v=>{const d=net[v]-fnd[v];if(d>nb.d)nb={v,d};if(-d>fb.d)fb={v,d:-d};});
  document.getElementById('tk_stream').innerHTML=`<span class="ic">🎯</span><div><b>network</b> сильнее документирован по «${nm(nb.v)}» (+${pp(nb.d)} п.п.), <b>foundation</b> — по «${nm(fb.v)}» (+${pp(fb.d)} п.п.). Развивай стримы под их сильные стороны и подтягивай слабые перед отчётом.</div>`;})();

// filters + grid
const facets={stream:new Set(),type:new Set(),year:new Set()};
const uniq=(k)=>[...new Set(projects.map(p=>p[k]).filter(Boolean))];
const fdef=[['stream','Стрим'],['type','Тип'],['year','Год']];
document.getElementById('filters').innerHTML=fdef.map(([k,lbl])=>
  `<div class="group"><span class="muted" style="font-size:13px;align-self:center">${lbl}:</span>`+
  uniq(k).map(v=>`<button class="fbtn" data-k="${k}" data-v="${v}" aria-pressed="false">${v}</button>`).join('')+`</div>`).join('');
function render(){
  const list=projects.filter(p=>['stream','type','year'].every(k=>facets[k].size===0||facets[k].has(p[k])));
  const g=document.getElementById('pgrid');
  g.innerHTML=list.length?list.map(p=>`<a class="pcard" href="/project.html?slug=${encodeURIComponent(p.slug)}">
    <div>${p.stream?`<span class="pill coral">${p.stream}</span>`:''}${p.type?`<span class="pill">${p.type}</span>`:''}</div>
    <div class="ttl">${p.title||p.slug}</div>
    <div class="meta">${[p.city,p.year].filter(Boolean).join(' · ')}</div>
    <div class="row"><span>👥 <b>${fmt(p.audience_onsite)}</b></span><span>🤝 <b>${fmt(p.partners_local)}</b></span><span>🌐 <b>${(p.languages||[]).length||'—'}</b></span></div>
  </a>`).join(''):`<div class="empty">Нет проектов под эти фильтры.</div>`;
}
document.getElementById('filters').addEventListener('click',e=>{const btn=e.target.closest('.fbtn');if(!btn)return;
  const{k,v}=btn.dataset;const on=btn.getAttribute('aria-pressed')==='true';
  btn.setAttribute('aria-pressed',String(!on));on?facets[k].delete(v):facets[k].add(v);render();});
render();
</script></body></html>
